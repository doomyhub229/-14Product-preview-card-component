<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Product preview card component</title>
</head>

<body>
  <main>
    <div class="card-component">
      <div class="container-left">
        <picture>
          <source media="(max-width: 425px)" srcset="./images/image-product-mobile.jpg">
          <img src="./images/image-product-desktop.jpg" alt="Product Image" class="product-image">
        </picture>
      </div>
      <div class="container-right">
        <div class="text">
          <span class="category">Perfume</span>
          <h1>Gabrielle Essence Eau De Parfum</h1>
          <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge,
            Perfumer-Creator for the House of CHANEL.</p>
        </div>
        <div class="price">
          <span class="current-price">$149.99</span>
          <del class="initial-price">$169.99</del> 
        </div>
        <button type="button" class="btn-add-cart">
          <img src="./images/icon-cart.svg" alt="" aria-hidden="true">
          <p>Add to Cart</p>
        </button>
      </div>
    </div>
  </main>
</body>

</html>
